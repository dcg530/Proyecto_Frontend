<!-- src/app/features/pacientes/pages/crear-paciente/crear-paciente.component.html -->
<div class="container py-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">{{ titulo }}</h4>
    </div>
    <div class="card-body">
      <form [formGroup]="pacienteForm" (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Identificación *</label>
            <input type="text" class="form-control" formControlName="identificacion" [readonly]="isEditMode">
            <div class="text-danger"
              *ngIf="pacienteForm.get('identificacion')?.invalid && pacienteForm.get('identificacion')?.touched">
              Identificación requerida (mínimo 6 caracteres)
            </div>
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label">Nombres *</label>
            <input type="text" class="form-control" formControlName="nombres">
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label">Apellidos *</label>
            <input type="text" class="form-control" formControlName="apellidos">
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label">Fecha Nacimiento *</label>
            <input type="date" class="form-control" formControlName="fechaNacimiento">
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label">EPS *</label>
            <select class="form-select" formControlName="eps">
              <option value="">Seleccione EPS</option>
              <option *ngFor="let eps of epsList" [value]="eps">{{ eps }}</option>
            </select>
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label">Teléfono</label>
            <input type="tel" class="form-control" formControlName="telefono" placeholder="Ej: 3001234567">
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" formControlName="correo" placeholder="ejemplo@correo.com">
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label">Género</label>
            <select class="form-select" formControlName="genero">
              <option value="">Seleccione</option>
              <option *ngFor="let genero of generos" [value]="genero">{{ genero }}</option>
            </select>
          </div>

          <div class="col-md-12 mb-3">
            <label class="form-label">Dirección</label>
            <textarea class="form-control" rows="2" formControlName="direccion"
              placeholder="Dirección de residencia"></textarea>
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-3">
          <button type="button" class="btn btn-secondary" (click)="cancelar()">
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary" [disabled]="isLoading">
            <span *ngIf="!isLoading">
              <i class="bi bi-save"></i> {{ isEditMode ? 'Actualizar' : 'Guardar' }}
            </span>
            <span *ngIf="isLoading">
              <span class="spinner-border spinner-border-sm me-2"></span>
              Procesando...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
