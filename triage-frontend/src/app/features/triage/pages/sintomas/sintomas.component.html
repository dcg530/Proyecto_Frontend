<!-- src/app/features/triage/pages/sintomas/sintomas.component.html -->
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">📝 Registro de Síntomas - Paciente #{{ triageId }}</h4>
        </div>
        <div class="card-body">

          <!-- Step 1: Síntomas -->
          <div *ngIf="step === 1">
            <h5 class="mb-3">¿Cuál es el motivo de su consulta?</h5>

            <div class="mb-3">
              <label class="form-label">Síntomas principales:</label>
              <div class="d-flex flex-wrap gap-2 mb-3">
                <button *ngFor="let sintoma of sintomasComunes" type="button" class="btn btn-outline-secondary btn-sm"
                  (click)="seleccionarSintoma(sintoma)">
                  {{ sintoma }}
                </button>
              </div>
              <textarea class="form-control" rows="3" formControlName="descripcion"
                placeholder="Describa sus síntomas en detalle..."></textarea>
              <small class="text-danger"
                *ngIf="sintomasForm.get('descripcion')?.invalid && sintomasForm.get('descripcion')?.touched">
                Por favor describa sus síntomas
              </small>
            </div>

            <div class="mb-3">
              <label class="form-label">Escala de dolor (0 = sin dolor, 10 = dolor máximo)</label>
              <div class="row">
                <div class="col-md-12">
                  <input type="range" class="form-range" min="0" max="10" step="1" formControlName="dolorEscala">
                  <div class="d-flex justify-content-between px-2">
                    <span *ngFor="let n of escalaDolor" class="small">{{ n }}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Step 2: Signos Vitales -->
          <div *ngIf="step === 2">
            <h5 class="mb-3">📊 Registro de Signos Vitales</h5>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Frecuencia Cardíaca (lpm)</label>
                <input type="number" class="form-control" formControlName="frecuenciaCardiaca" placeholder="60-100 lpm">
                <small class="text-muted">Normal: 60-100 lpm</small>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Presión Arterial (mmHg)</label>
                <div class="row">
                  <div class="col-6">
                    <input type="number" class="form-control" formControlName="presionArterialSistolica"
                      placeholder="Sistólica">
                  </div>
                  <div class="col-6">
                    <input type="number" class="form-control" formControlName="presionArterialDiastolica"
                      placeholder="Diastólica">
                  </div>
                </div>
                <small class="text-muted">Normal: 120/80 mmHg</small>
              </div>

              <div class="col-md-4 mb-3">
                <label class="form-label">Temperatura (°C)</label>
                <input type="number" step="0.1" class="form-control" formControlName="temperatura"
                  placeholder="36.5-37.5 °C">
                <small class="text-muted">Normal: 36.5-37.5 °C</small>
              </div>

              <div class="col-md-4 mb-3">
                <label class="form-label">Saturación O₂ (%)</label>
                <input type="number" class="form-control" formControlName="saturacionOxigeno" placeholder="95-100%">
                <small class="text-muted">Normal: >95%</small>
              </div>

              <div class="col-md-4 mb-3">
                <label class="form-label">Frecuencia Respiratoria (rpm)</label>
                <input type="number" class="form-control" formControlName="frecuenciaRespiratoria"
                  placeholder="12-20 rpm">
                <small class="text-muted">Normal: 12-20 rpm</small>
              </div>
            </div>
          </div>

          <!-- Botones de Navegación -->
          <div class="d-flex justify-content-between mt-4">
            <button class="btn btn-secondary" (click)="volver()">
              ← Volver
            </button>
            <button class="btn btn-primary" (click)="siguienteStep()"
              [disabled]="(step === 1 && sintomasForm.invalid) || isLoading">
              <span *ngIf="!isLoading">{{ step === 1 ? 'Continuar →' : 'Clasificar →' }}</span>
              <span *ngIf="isLoading">
                <span class="spinner-border spinner-border-sm me-2"></span>
                Procesando...
              </span>
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
