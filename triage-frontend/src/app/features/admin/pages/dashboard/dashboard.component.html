<!-- src/app/features/admin/pages/dashboard/dashboard.component.html (versión simplificada) -->
<div class="container-fluid py-4">
  <div class="row">
    <div class="col-12">
      <div class="card shadow">
        <div class="card-body">
          <div class="text-center py-4">
            <i class="bi bi-speedometer2" style="font-size: 64px; color: #667eea;"></i>
            <h2 class="mt-3">Panel de Administrador</h2>
            <p class="text-muted">Bienvenido, {{ currentUser?.username }}</p>
            <hr>

            <div class="row mt-4">
              <div class="col-md-4 mb-3">
                <div class="card bg-primary text-white h-100">
                  <div class="card-body text-center">
                    <i class="bi bi-people fs-1"></i>
                    <h3 class="mt-2">Pacientes</h3>
                    <p class="display-4">{{ stats.totalPacientes || 0 }}</p>
                    <button class="btn btn-light mt-2" (click)="irAPacientes()">
                      Gestionar
                    </button>
                  </div>
                </div>
              </div>

              <div class="col-md-4 mb-3">
                <div class="card bg-warning text-white h-100">
                  <div class="card-body text-center">
                    <i class="bi bi-clock-history fs-1"></i>
                    <h3 class="mt-2">En Espera</h3>
                    <p class="display-4">{{ stats.enEspera }}</p>
                    <button class="btn btn-light mt-2" (click)="irASalaEspera()">
                      Ver cola
                    </button>
                  </div>
                </div>
              </div>

              <div class="col-md-4 mb-3">
                <div class="card bg-success text-white h-100">
                  <div class="card-body text-center">
                    <i class="bi bi-shield-check fs-1"></i>
                    <h3 class="mt-2">Validaciones</h3>
                    <p class="display-4">Pendientes</p>
                    <button class="btn btn-light mt-2" (click)="irAValidacion()">
                      Validar
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <hr class="my-4">

            <button class="btn btn-danger" (click)="logout()">
              <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
